services:
  polytrack:
    build: .
    image: polytrack:latest
    container_name: polytrack
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      # Persist SQLite DB + config.json across restarts/upgrades
      - ./data:/app/data
    environment:
      NODE_ENV: production
      PORT: 3000
      # ── Auth / keys ──────────────────────────────────────────────────
      API_TOKEN: ${API_TOKEN:-}
      PRIVATE_KEY: ${PRIVATE_KEY:-}
      FUNDER_ADDRESS: ${FUNDER_ADDRESS:-}
      # ── Operation ────────────────────────────────────────────────────
      SIMULATION: ${SIMULATION:-true}
      SCAN_INTERVAL_MIN: ${SCAN_INTERVAL_MIN:-10}
      # ── Risk limits (falls back to config.json defaults) ─────────────
      MAX_DAILY_LOSS_USDC: ${MAX_DAILY_LOSS_USDC:-}
      MAX_MARKET_EXPOSURE_USDC: ${MAX_MARKET_EXPOSURE_USDC:-}
      MAX_TOTAL_EXPOSURE_USDC: ${MAX_TOTAL_EXPOSURE_USDC:-}
      MARKET_COOLDOWN_MIN: ${MARKET_COOLDOWN_MIN:-}
      # ── Monitoring (optional) ────────────────────────────────────────
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
